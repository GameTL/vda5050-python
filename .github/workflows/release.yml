name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump for this manual release'
        type: choice
        default: patch
        options: [patch, minor, major]

permissions:
  contents: write
  pull-requests: read
  issues: write

jobs:
  tag-and-release:
    name: Tag and publish release
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && (contains(github.event.pull_request.labels.*.name, 'release:patch') || contains(github.event.pull_request.labels.*.name, 'release:minor') || contains(github.event.pull_request.labels.*.name, 'release:major')))
    runs-on: ubuntu-latest
    outputs:
      next: ${{ steps.version.outputs.next }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Determine last tag
        id: last_tag
        run: |
          set -euo pipefail
          # Only clean semver tags (ignore prereleases like v0.0.1-alpha).
          last=$(git tag --list 'v*.*.*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)
          if [ -z "$last" ]; then
            last="v0.0.1"
          fi
          echo "tag=$last" >> "$GITHUB_OUTPUT"
          echo "Last release tag: $last"

      - name: Resolve bump
        id: bump
        env:
          EVENT: ${{ github.event_name }}
          INPUT_BUMP: ${{ github.event.inputs.bump }}
          LABELS: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "workflow_dispatch" ]; then
            bump="${INPUT_BUMP:-patch}"
          else
            names=$(echo "$LABELS" | jq -r '.[].name // empty')
            bump="patch"
            if echo "$names" | grep -qx 'release:major'; then
              bump="major"
            elif echo "$names" | grep -qx 'release:minor'; then
              bump="minor"
            elif echo "$names" | grep -qx 'release:patch'; then
              bump="patch"
            fi
          fi
          echo "bump=$bump" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        id: version
        env:
          LAST: ${{ steps.last_tag.outputs.tag }}
          BUMP: ${{ steps.bump.outputs.bump }}
        run: |
          set -euo pipefail
          v="${LAST#v}"
          IFS='.' read -r major minor patch <<< "$v"
          case "$BUMP" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          next="v${major}.${minor}.${patch}"
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "Next version: $next"

      - name: Create tag
        env:
          NEXT: ${{ steps.version.outputs.next }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEXT" -m "Release $NEXT"
          git push origin "$NEXT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT: ${{ steps.version.outputs.next }}
          LAST: ${{ steps.last_tag.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse "$LAST" >/dev/null 2>&1; then
            notes=$(git log "$LAST".."$NEXT" --pretty='- %s (%h)' --no-merges || true)
          else
            notes=$(git log "$NEXT" --pretty='- %s (%h)' --no-merges -n 50 || true)
          fi
          if [ -z "$notes" ]; then
            notes="- Release ${NEXT}"
          fi
          # Notes only — no wheel/docker assets (build-only CI policy).
          gh release create "$NEXT" \
            --title "$NEXT" \
            --target main \
            --notes "$notes"

  close-issues:
    name: Close issues referenced by the release PR
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && (contains(github.event.pull_request.labels.*.name, 'release:patch') || contains(github.event.pull_request.labels.*.name, 'release:minor') || contains(github.event.pull_request.labels.*.name, 'release:major'))
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BODY: ${{ github.event.pull_request.body }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Close referenced issues
        run: |
          set -euo pipefail
          nums=$(printf '%s' "$BODY" \
            | grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)[[:space:]]+#[0-9]+' \
            | grep -oE '[0-9]+' \
            | sort -n -u || true)
          if [ -z "$nums" ]; then
            echo "No issues referenced with closing keywords; nothing to close."
            exit 0
          fi
          for n in $nums; do
            echo "Closing #$n"
            gh issue close "$n" \
              --comment "Closed automatically by release PR #${PR_NUMBER}." \
              || echo "Could not close #$n (already closed or missing) — skipping"
          done

  sync-main-to-dev:
    name: Fast-forward dev with main
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && (contains(github.event.pull_request.labels.*.name, 'release:patch') || contains(github.event.pull_request.labels.*.name, 'release:minor') || contains(github.event.pull_request.labels.*.name, 'release:major')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge main into dev
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin
          git checkout dev
          git merge --ff-only origin/main || git merge --no-ff origin/main -m "chore: sync main into dev after release"
          git push origin dev
