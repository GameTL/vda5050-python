name: Validate release labels

on:
  pull_request:
    types: [opened, edited, labeled, unlabeled, synchronize]
    branches: [main]

permissions:
  pull-requests: write

jobs:
  check-release-label:
    name: Require one release:* label on release PRs
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Ensure exactly one of release:major / release:minor / release:patch
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          set -euo pipefail
          count=$(echo "$LABELS" | jq '[.[].name | select(. == "release:major" or . == "release:minor" or . == "release:patch")] | length')
          if [ "$count" -ne 1 ]; then
            echo "::error::PRs to main must carry exactly one of: release:major, release:minor, release:patch (found $count)."
            exit 1
          fi
