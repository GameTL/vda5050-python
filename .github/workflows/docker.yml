name: Docker

# Build the VDA5050 master and adapter example images on PRs and main.
# Push to GHCR on main / tags / workflow_dispatch / release workflow_call.
# PRs are build-only. No :dev image.
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        description: 'Semver tag to publish (e.g. v0.0.2). Empty = branch/PR tags only.'
        type: string
        required: false
        default: ''
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  docker:
    name: Build ${{ matrix.image }} image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: master
            dockerfile: examples/docker/vda5050-master.Dockerfile
            cache_scope: master
          - image: adapter
            dockerfile: examples/docker/vda5050-adapter.Dockerfile
            cache_scope: adapter
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=raw,value=latest,enable=${{ (github.event_name == 'workflow_call' && inputs.version != '') || startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ inputs.version || 'none' }},enable=${{ github.event_name == 'workflow_call' && inputs.version != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: examples/docker
          file: ${{ matrix.dockerfile }}
          pull: true
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
