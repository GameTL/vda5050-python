name: Branch name

# Enforce conventional branch names on pull requests (aligned with commitlint types).
# Allowed: type/description  e.g. feat/docker-ghcr, fix/mqtt-timeout, ci/wheels
# Exempt: main, dev, dependabot/**
on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  check-branch-name:
    name: Validate branch name
    runs-on: ubuntu-latest
    steps:
      - name: Check head branch follows type/description
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          # Exempt long-lived and bot branches
          case "$BRANCH" in
            main|dev|dependabot/*)
              echo "Exempt branch: $BRANCH"
              exit 0
              ;;
          esac

          # Conventional-commit types as prefixes (same set as @commitlint/config-conventional)
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)/[a-z0-9][a-z0-9._/-]*$'

          if [[ "$BRANCH" =~ $pattern ]]; then
            echo "OK: $BRANCH"
            exit 0
          fi

          echo "::error::Branch '$BRANCH' does not match convention."
          echo "Use: <type>/<description>  e.g. feat/add-adapter, fix/mqtt-timeout, ci/docker-tags"
          echo "Allowed types: feat fix docs style refactor perf test build ci chore revert"
          exit 1
