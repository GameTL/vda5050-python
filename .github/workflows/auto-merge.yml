name: Auto-merge labeled PRs

on:
  pull_request:
    types: [labeled, unlabeled, synchronize, opened, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    name: Enable auto-merge
    if: contains(github.event.pull_request.labels.*.name, 'ready-to-merge') && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (squash)
        env:
          # Use GHCR_TOKEN (PAT), not GITHUB_TOKEN, so the merge commit
          # DOES trigger downstream workflows (e.g. release.yml on PRs to
          # main). Merges made with GITHUB_TOKEN do not trigger other runs.
          GH_TOKEN: ${{ secrets.GHCR_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr merge "$PR_URL" --squash --auto --delete-branch

  disable-auto-merge:
    name: Disable auto-merge if label removed
    if: github.event.action == 'unlabeled' && github.event.label.name == 'ready-to-merge'
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "$PR_URL" --disable-auto || true
