name: Wheels

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - dev
      - main
    tags:
      - 'v*.*.*'

env:
  FORCE_COLOR: 3

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_sdist:
    name: Build SDist
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: true

    - name: Build SDist
      run: pipx run build --sdist

    - name: Check metadata
      run: pipx run twine check dist/*

    - uses: actions/upload-artifact@v7
      with:
        name: cibw-sdist
        path: dist/*.tar.gz


  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # TODO os: [ubuntu-24.04, macos-15-intel, macos-latest, windows-latest, ubuntu-24.04-arm, windows-11-]
        # Pin ubuntu-24.04 (glibc) so Linux wheels match examples/docker (FROM ubuntu:24.04).
        include:
          - os: ubuntu-24.04
            macos_deployment_target: ""
          - os: macos-26-intel
            macos_deployment_target: "26.0"
          - os: macos-26
            macos_deployment_target: "26.0"

    steps:
    - uses: actions/checkout@v7
      with:
        submodules: true

    - uses: astral-sh/setup-uv@v9.0.0

    - name: Install native dependencies on macOS
      if: runner.os == 'macOS'
      run: bash .github/scripts/install-native-deps.sh
      env:
        MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_deployment_target }}

    - uses: pypa/cibuildwheel@v4.1
      env:
        CIBW_BEFORE_ALL_LINUX: >
          bash {package}/.github/scripts/install-native-deps.sh

        CIBW_ENVIRONMENT_LINUX: >
          CMAKE_PREFIX_PATH=/usr/local

        CIBW_ENVIRONMENT_MACOS: >
          MACOSX_DEPLOYMENT_TARGET=${{ matrix.macos_deployment_target }}

        CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
          LD_LIBRARY_PATH=/usr/local/lib:/usr/local/lib64
          auditwheel repair -w {dest_dir} {wheel}

        CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
          DYLD_LIBRARY_PATH=$REPAIR_LIBRARY_PATH
          delocate-wheel --require-archs {delocate_archs}
          -w {dest_dir} -v {wheel}

    - name: Verify clean directory
      run: git diff --exit-code
      shell: bash

    - uses: actions/upload-artifact@v7
      with:
        name: cibw-wheels-${{ matrix.os }}
        path: wheelhouse/*.whl


  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build_sdist, build_wheels]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          assets=(dist/*.whl dist/*.tar.gz)
          if (( ${#assets[@]} == 0 )); then
            echo "No wheel or sdist artifacts found in dist/" >&2
            exit 1
          fi
          gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
