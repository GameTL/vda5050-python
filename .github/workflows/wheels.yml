name: Wheels

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
     - main
  release:
    types:
      - published

env:
  FORCE_COLOR: 3

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_sdist:
    name: Build SDist
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true

    - name: Build SDist
      run: pipx run build --sdist

    - name: Check metadata
      run: pipx run twine check dist/*

    - uses: actions/upload-artifact@v7
      with:
        name: cibw-sdist
        path: dist/*.tar.gz


  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # TODO os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest, ubuntu-24.04-arm, windows-11-]
        include:
          - os: ubuntu-latest
            macos_deployment_target: ""
          - os: macos-26-intel
            macos_deployment_target: "26.0"
          - os: macos-26
            macos_deployment_target: "26.0"

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true

    - uses: astral-sh/setup-uv@v8.1.0

    - name: Install native dependencies on macOS
      if: runner.os == 'macOS'
      run: bash .github/scripts/install-native-deps.sh
      env:
        MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_deployment_target }}

    - uses: pypa/cibuildwheel@v3.4
      env:
        CIBW_BEFORE_ALL_LINUX: >
          bash {package}/.github/scripts/install-native-deps.sh

        CIBW_ENVIRONMENT_LINUX: >
          CMAKE_PREFIX_PATH=/usr/local

        CIBW_ENVIRONMENT_MACOS: >
          MACOSX_DEPLOYMENT_TARGET=${{ matrix.macos_deployment_target }}

        CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
          LD_LIBRARY_PATH=/usr/local/lib:/usr/local/lib64
          auditwheel repair -w {dest_dir} {wheel}

        CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
          DYLD_LIBRARY_PATH=$REPAIR_LIBRARY_PATH
          delocate-wheel --require-archs {delocate_archs}
          -w {dest_dir} -v {wheel}

    - name: Verify clean directory
      run: git diff --exit-code
      shell: bash

    - uses: actions/upload-artifact@v7
      with:
        name: cibw-wheels-${{ matrix.os }}
        path: wheelhouse/*.whl


  upload_all:
    name: Upload if release
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    environment: pypi
    permissions:
      id-token: write
      attestations: write

    steps:
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - uses: actions/download-artifact@v8
      with:
        pattern: cibw-*
        merge-multiple: true
        path: dist

    - name: Generate artifact attestation for sdist and wheels
      uses: actions/attest-build-provenance@v4
      with:
        subject-path: "dist/*"

    - uses: pypa/gh-action-pypi-publish@release/v1
