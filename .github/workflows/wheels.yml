name: Wheels

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
     - main
  release:
    types:
      - published

env:
  FORCE_COLOR: 3

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_sdist:
    name: Build SDist
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Build SDist
      run: pipx run build --sdist

    - name: Check metadata
      run: pipx run twine check dist/*

    - uses: actions/upload-artifact@v7
      with:
        name: cibw-sdist
        path: dist/*.tar.gz


  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v7

    - name: Install native dependencies (host, for non-container builds)
      if: runner.os == 'macOS'
      run: bash .github/scripts/install-native-deps.sh

    - uses: astral-sh/setup-uv@v8.3.2

    - uses: pypa/cibuildwheel@v4.1
      env:
        CIBW_BEFORE_ALL_LINUX: bash {package}/.github/scripts/install-native-deps.sh
        CIBW_ENVIRONMENT_MACOS: >
          CMAKE_PREFIX_PATH=/opt/homebrew:/usr/local
        CIBW_ENVIRONMENT_LINUX: >
          CMAKE_PREFIX_PATH=/usr/local
        CIBW_SKIP: "*-win* *-manylinux_i686 *musllinux*"

    - name: Verify clean directory
      run: git diff --exit-code
      shell: bash

    - uses: actions/upload-artifact@v7
      with:
        name: cibw-wheels-${{ matrix.os }}
        path: wheelhouse/*.whl


  upload_all:
    name: Upload if release
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    environment: pypi
    permissions:
      id-token: write
      attestations: write

    steps:
    - uses: actions/setup-python@v6
      with:
        python-version: "3.x"

    - uses: actions/download-artifact@v8
      with:
        pattern: cibw-*
        merge-multiple: true
        path: dist

    - name: Generate artifact attestation for sdist and wheels
      uses: actions/attest-build-provenance@v4
      with:
        subject-path: "dist/*"

    - uses: pypa/gh-action-pypi-publish@release/v1
