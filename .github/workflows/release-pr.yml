name: Release PR (dev -> main)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Force a specific bump (auto detects from PR labels if blank)'
        required: false
        type: choice
        default: ''
        options: ['', 'major', 'minor', 'patch']

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    name: Open / refresh release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: dev

      - name: Determine last release tag
        id: last_tag
        run: |
          set -euo pipefail
          last=$(git tag --list 'v*.*.*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)
          if [ -z "$last" ]; then
            last="v0.0.1"
          fi
          echo "tag=$last" >> "$GITHUB_OUTPUT"
          echo "Last release tag: $last"

      - name: Detect bump from merged PR labels
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCED: ${{ inputs.bump }}
          LAST_TAG: ${{ steps.last_tag.outputs.tag }}
        run: |
          set -euo pipefail

          if [ -n "$FORCED" ]; then
            echo "bump=$FORCED" >> "$GITHUB_OUTPUT"
            echo "Forced bump: $FORCED"
            exit 0
          fi

          since=$(git log -1 --format=%cI "$LAST_TAG" 2>/dev/null || echo "1970-01-01T00:00:00Z")
          echo "Looking at PRs merged into dev since $since"

          labels=$(gh pr list \
            --base dev \
            --state merged \
            --search "merged:>$since" \
            --json labels \
            --jq '[.[].labels[].name] | unique | .[]' || true)

          echo "Labels found:"
          echo "$labels"

          bump="patch"
          if echo "$labels" | grep -qx 'release:major'; then
            bump="major"
          elif echo "$labels" | grep -qx 'release:minor'; then
            bump="minor"
          fi
          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          echo "Resolved bump: $bump"

      - name: Compute next version
        id: version
        env:
          LAST: ${{ steps.last_tag.outputs.tag }}
          BUMP: ${{ steps.bump.outputs.bump }}
        run: |
          set -euo pipefail
          v="${LAST#v}"
          IFS='.' read -r major minor patch <<< "$v"
          case "$BUMP" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          next="v${major}.${minor}.${patch}"
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "Next version: $next"

      - name: Generate changelog since last tag
        id: changelog
        env:
          LAST: ${{ steps.last_tag.outputs.tag }}
        run: |
          set -euo pipefail
          {
            echo 'body<<EOF'
            if git rev-parse "$LAST" >/dev/null 2>&1; then
              git log "$LAST"..origin/dev --pretty='- %s (%h)' --no-merges
            else
              git log origin/dev --pretty='- %s (%h)' --no-merges -n 50
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Collect referenced issues to close
        id: closes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LAST_TAG: ${{ steps.last_tag.outputs.tag }}
        run: |
          set -euo pipefail

          since=$(git log -1 --format=%cI "$LAST_TAG" 2>/dev/null || echo "1970-01-01T00:00:00Z")
          echo "Scanning PRs merged into dev since $since for issue references"

          text=$(gh pr list \
            --base dev \
            --state merged \
            --search "merged:>$since" \
            --json title,body \
            --jq '.[] | (.title + "\n" + (.body // ""))' || true)

          if git rev-parse "$LAST_TAG" >/dev/null 2>&1; then
            commits=$(git log "$LAST_TAG"..origin/dev --pretty='%B' || true)
          else
            commits=$(git log origin/dev --pretty='%B' || true)
          fi

          nums=$(printf '%s\n%s\n' "$text" "$commits" \
            | grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?|refs?)[[:space:]]+#[0-9]+' \
            | grep -oE '[0-9]+' \
            | sort -n -u || true)

          echo "Issues to close: ${nums:-none}"

          {
            echo 'lines<<EOF'
            for n in $nums; do
              echo "Closes #$n"
            done
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create or update release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT: ${{ steps.version.outputs.next }}
          BUMP: ${{ steps.bump.outputs.bump }}
          CHANGES: ${{ steps.changelog.outputs.body }}
          CLOSES: ${{ steps.closes.outputs.lines }}
        run: |
          set -euo pipefail

          title="Release ${NEXT}"

          closes_section=""
          if [ -n "${CLOSES//[$'\n\t ']/}" ]; then
            closes_section=$'\n## Closes\n'"${CLOSES}"$'\n'
          fi

          body=$(cat <<EOF
          Automated release PR from \`dev\` -> \`main\`.

          **Bump:** \`${BUMP}\`
          **Next version:** \`${NEXT}\`

          ## Changes
          ${CHANGES}
          ${closes_section}
          ---
          Merging this PR will trigger tagging and a GitHub Release (notes only; no wheel/docker publish yet).
          EOF
          )

          existing=$(gh pr list \
            --head dev \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          bump_label="release:${BUMP}"

          if [ -n "$existing" ]; then
            for l in release:major release:minor release:patch; do
              if [ "$l" != "$bump_label" ]; then
                gh pr edit "$existing" --remove-label "$l" || true
              fi
            done
            gh pr edit "$existing" --title "$title" --body "$body" \
              --add-label "release" --add-label "$bump_label"
            echo "Updated existing release PR #$existing with $bump_label"
          else
            gh pr create \
              --base main \
              --head dev \
              --title "$title" \
              --body "$body" \
              --label "release" \
              --label "$bump_label"
          fi
