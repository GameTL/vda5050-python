name: "Pip"

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - dev
      - main

jobs:
  build:
    name: Build with Pip
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-24.04, macos-26]
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true

    - name: Install native dependencies
      run: bash .github/scripts/install-native-deps.sh
      env:
        MACOSX_DEPLOYMENT_TARGET: ${{ runner.os == 'macOS' && '26.0' || '' }}

    - name: Build and install
      env:
        CMAKE_PREFIX_PATH: ${{ runner.os == 'macOS' && '/opt/homebrew' || '/usr/local' }}
        MACOSX_DEPLOYMENT_TARGET: ${{ runner.os == 'macOS' && '26.0' || '' }}
      run: pip install --verbose . --group test

    - name: Test
      env:
        DYLD_LIBRARY_PATH: /opt/homebrew/lib:/opt/homebrew/opt/openssl@3/lib
        LD_LIBRARY_PATH: /usr/local/lib:/usr/local/lib64
      run: pytest
